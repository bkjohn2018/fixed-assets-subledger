name: fa_balances
grain: asset_book_period
primary_key: [ASSET_ID, BOOK_TYPE_CODE, PERIOD_COUNTER]
foreign_keys:
  - ASSET_ID -> D_Asset.ASSET_ID
  - BOOK_TYPE_CODE -> D_Book.BOOK_TYPE_CODE
  - PERIOD_COUNTER -> D_Time.PERIOD_COUNTER
refresh: {cadence: monthly, partitioning: by_period(PERIOD_NAME)}
columns:
  - {name: ASSET_ID, type: NUMBER, required: true}
  - {name: BOOK_TYPE_CODE, type: VARCHAR2(30), required: true}
  - {name: PERIOD_COUNTER, type: NUMBER, required: true}
  - {name: PERIOD_NAME, type: VARCHAR2(30)}
  - {name: COST_BEG, type: NUMBER}
  - {name: ADDITIONS, type: NUMBER}
  - {name: ADJUSTMENTS, type: NUMBER}
  - {name: TRANSFERS_NET, type: NUMBER}
  - {name: RETIREMENTS_COST, type: NUMBER}
  - {name: DEPRN_PERIOD, type: NUMBER}
  - {name: DEPRN_YTD, type: NUMBER}
  - {name: DEPRN_ITD, type: NUMBER}
  - {name: NBV_END, type: NUMBER}
  - {name: UNITS, type: NUMBER}
source_notes:
  oracle_release: 26B
  otbi_subject_area: Fixed Assets - Asset Balances Real Time
  documented_source_grain: asset transaction distribution line (FA_BALANCES_EXTRACT)
  extraction_rule: Aggregate OTBI distribution-grain rows to ASSET_ID, BOOK_TYPE_CODE, PERIOD_COUNTER.
  prerequisite: Run the Extract Asset Reporting Data ESS job before exporting OTBI data.
version: 26B
